<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />

    <!-- ── Viewport & display ─────────────────────────────────────────── -->
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <!-- ── Primary meta ───────────────────────────────────────────────── -->
    <title>Vibify — Music for every moment</title>
    <meta name="description" content="Vibify — Music for every moment" />
    <meta name="application-name" content="Vibify" />
    <meta name="generator" content="Vite" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="color-scheme" content="dark" />

    <!-- ── Theme color (status bar) ───────────────────────────────────── -->
    <meta name="theme-color" content="#05090c" />

    <!-- ── Favicon / icons ────────────────────────────────────────────── -->
    <link rel="icon" type="image/png" href="/icons/logo.png" />
    <link rel="apple-touch-icon" href="/icons/logo.png" />

    <!-- ── PWA manifest ────────────────────────────────────────────────── -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- ── iOS PWA (Safari / WebKit) ──────────────────────────────────── -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Vibify" />
    <meta name="apple-mobile-web-app-orientations" content="portrait" />

    <!-- ── Android / Chrome ────────────────────────────────────────────── -->
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- ── Windows / Microsoft ─────────────────────────────────────────── -->
    <meta name="msapplication-TileColor" content="#05090c" />
    <meta name="msapplication-TileImage" content="/icons/logo.png" />
    <meta name="msapplication-tap-highlight" content="no" />
    <meta name="msapplication-starturl" content="/" />

    <!-- ── Open Graph (for share previews) ───────────────────────────── -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Vibify — Music for every moment" />
    <meta property="og:description" content="Stream your favourite songs, albums and playlists." />
    <meta property="og:image" content="/icons/logo.png" />
    <meta property="og:image:width" content="1024" />
    <meta property="og:image:height" content="1024" />

    <!-- ── Twitter card ───────────────────────────────────────────────── -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Vibify — Music for every moment" />
    <meta name="twitter:description" content="Stream your favourite songs, albums and playlists." />
    <meta name="twitter:image" content="/icons/logo.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
